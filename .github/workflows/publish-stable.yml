name: Publish @latest

on:
  # Déclenche à la demande depuis l'onglet Actions — évite de publier
  # systématiquement sur chaque push main, qui est souvent un merge
  # de develop sans intention de release.
  workflow_dispatch:
    inputs:
      bump:
        description: "Type de bump semver"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: publish-stable
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Bump ${{ inputs.bump }}
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Rebuild après bump
        run: npm run build

      - name: Expose la nouvelle version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish @latest sur npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit release + tag + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json dist/
          git commit -m "chore(release): ${{ steps.version.outputs.version }} [skip ci]"
          git tag -a "v${{ steps.version.outputs.version }}" -m "stable release ${{ steps.version.outputs.version }}"
          git push origin main --follow-tags
