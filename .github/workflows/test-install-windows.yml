name: Test install Windows

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/install.ps1"
      - ".github/workflows/test-install-windows.yml"
      # Trigger aussi sur changements du build ou deps — permet de catcher
      # les régressions cross-platform (ex: bug subpath imports chalk) avant
      # qu'un user Windows ne les rencontre.
      - "scripts/build.mjs"
      - "package.json"
      - "package-lock.json"

jobs:
  test-install:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run install script
        shell: pwsh
        continue-on-error: true
        run: |
          iwr -useb "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/scripts/install.ps1" | iex

      - name: Debug install tree
        shell: pwsh
        run: |
          Write-Host "=== Content of $env:USERPROFILE\.aicli ==="
          Get-ChildItem -Path "$env:USERPROFILE\.aicli" -Recurse -Depth 3 -ErrorAction SilentlyContinue | Select-Object FullName
          Write-Host "=== aicli.cmd path ==="
          Get-ChildItem -Path "$env:USERPROFILE\.aicli\aicli*" -ErrorAction SilentlyContinue

      - name: Verify aicli entrypoint exists
        shell: pwsh
        run: |
          $entrypoint = Join-Path $env:USERPROFILE ".aicli\node_modules\@juliank.\aicli\dist\index.js"
          if (-not (Test-Path $entrypoint)) {
            Write-Host "Not at expected path, searching..."
            Get-ChildItem -Path "$env:USERPROFILE\.aicli" -Filter "index.js" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            Write-Error "FAIL: $entrypoint missing"
            exit 1
          }
          Write-Host "OK: $entrypoint exists"

      - name: Verify aicli binary responds
        shell: pwsh
        run: |
          $env:Path = "$env:USERPROFILE\.aicli;$env:Path"
          $version = & aicli --version 2>&1
          Write-Host "aicli --version: $version"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "aicli --version failed"
            exit 1
          }

      - name: Verify full import chain (--help charge ink + chalk)
        shell: pwsh
        run: |
          # --help force le chargement de tous les imports lourds (ink, chalk,
          # yaml, inquirer). C'est ici qu'on catcherait un ERR_PACKAGE_IMPORT_NOT_DEFINED
          # ou autre bug de résolution modules avant qu'un user Windows ne le voie.
          $env:Path = "$env:USERPROFILE\.aicli;$env:Path"
          $help = & aicli --help 2>&1
          Write-Host "aicli --help exit: $LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "--- output ---"
            Write-Host $help
            Write-Error "aicli --help failed — regression dans le bundle ou import chain"
            exit 1
          }
          if ($help -notmatch "REPL") {
            Write-Host "--- output ---"
            Write-Host $help
            Write-Error "aicli --help ne contient pas 'REPL' — output inattendu"
            exit 1
          }
